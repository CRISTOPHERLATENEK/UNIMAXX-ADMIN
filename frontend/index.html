<head>
  <meta charset="UTF-8" />

  <!-- Open Graph -->

  <meta property="og:description" content="Soluções tecnológicas completas para o varejo. Transformando complexidade em resultado." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Unimaxx — Tecnologia para o Varejo" />
  <meta name="twitter:description" content="Soluções tecnológicas completas para o varejo." />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f97316'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-weight='900' fill='white' font-family='Arial'>U</text></svg>" />

  <!-- ═══════════════════════════════════════════════════
       PERFORMANCE OPTIMIZATIONS
       1. CSS preload antes do render (evita FOUC)
       2. Google Fonts não-bloqueante (media trick)
       3. Admin bundle REMOVIDO do preload público
       4. Inline critical CSS (CLS/FCP fix)
  ═══════════════════════════════════════════════════ -->

  <!-- 1. Preload do CSS principal com alta prioridade -->

  <!-- 2. Google Fonts NÃO-bloqueante (evita render-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=optional" /></noscript>

  <!-- 3. JS principal (módulo = diferido por padrão, não bloqueia) -->
  <!-- Preload apenas dos bundles usados em TODAS as páginas públicas -->
  <!-- REMOVIDO: admin-BbCxH04u.js — era carregado desnecessariamente em páginas públicas -->
  <!-- O admin bundle carrega dinamicamente APENAS quando /admin é acessado -->

  <!-- 4. Stylesheets -->
  <link rel="stylesheet" href="/assets/mobile-fix.css" />
  <script type="module" src="/src/main.tsx"></script>

  <!-- ═══════════════════════════════════════════════════
       CRITICAL INLINE CSS — Fix CLS (Cumulative Layout Shift)
       Reserva espaço visual ANTES do React carregar,
       evitando o "salto" de layout que causa CLS = 1.0
  ═══════════════════════════════════════════════════ -->
  <style id="critical-css">
    /* ── Reset mínimo para evitar FOUC ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; }
    body { font-family: 'DM Sans', system-ui, sans-serif; }

    /* ── Skeleton de carregamento ── */
    @keyframes sk-shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .sk {
      background: linear-gradient(90deg, #e8e8e8 25%, #f0f0f0 50%, #e8e8e8 75%);
      background-size: 800px 100%;
      animation: sk-shimmer 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
    .sk-dark {
      background: linear-gradient(90deg, #1a1b24 25%, #22232f 50%, #1a1b24 75%);
      background-size: 800px 100%;
      animation: sk-shimmer 1.4s ease-in-out infinite;
    }

    /* ── Header placeholder ── */
    #sk-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 68px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      z-index: 9999;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    #sk-header .sk-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: #f97316; flex-shrink: 0;
    }
    #sk-header .sk-logo-text { width: 90px; height: 18px; }
    #sk-header .sk-nav { display: flex; gap: 12px; margin-left: auto; }
    #sk-header .sk-nav span { width: 60px; height: 14px; }
    #sk-header .sk-btn { width: 100px; height: 36px; border-radius: 8px; }

    /* ── Banner placeholder ── */
    #sk-banner {
      width: 100%;
      min-height: 520px;
      background: #050507;
      display: flex;
      align-items: center;
      padding: 68px 48px 48px;
      gap: 40px;
      overflow: hidden;
    }
    #sk-banner .sk-content { flex: 1; display: flex; flex-direction: column; gap: 16px; }
    #sk-banner .sk-tag  { width: 120px; height: 28px; border-radius: 20px; }
    #sk-banner .sk-h1   { width: 70%;  height: 52px; border-radius: 8px; }
    #sk-banner .sk-h1b  { width: 50%;  height: 52px; border-radius: 8px; margin-top: -4px; }
    #sk-banner .sk-p    { width: 55%;  height: 16px; border-radius: 4px; margin-top: 8px; }
    #sk-banner .sk-p2   { width: 40%;  height: 16px; border-radius: 4px; }
    #sk-banner .sk-cta  { width: 160px; height: 48px; border-radius: 12px; margin-top: 16px; }
    #sk-banner .sk-img  {
      width: 420px; height: 360px; border-radius: 16px;
      flex-shrink: 0;
    }

    /* ── Section placeholders abaixo do banner ── */
    #sk-sections { padding: 64px 48px 0; }
    #sk-row { display: flex; gap: 20px; margin-bottom: 64px; }
    #sk-row .sk-card {
      flex: 1; height: 140px; border-radius: 16px;
    }

    /* ── Mobile adjustments ── */
    @media (max-width: 767px) {
      #sk-header .sk-nav, #sk-header .sk-btn { display: none; }
      #sk-banner { padding: 88px 24px 40px; flex-direction: column; min-height: 460px; }
      #sk-banner .sk-img { display: none; }
      #sk-banner .sk-h1, #sk-banner .sk-h1b { width: 90%; }
      #sk-sections { padding: 40px 16px 0; }
      #sk-row { flex-direction: column; }
      #sk-row .sk-card { height: 80px; }
    }

    /* ── Quando React carrega, esconde o skeleton ── */
    #root:not(:empty) ~ #page-skeleton,
    #root:not(:empty) + #page-skeleton {
      display: none !important;
    }
  </style>
</head>

<body>
  <!-- Skeleton inline: reserva espaço visual durante carregamento do React -->
  <!-- Evita CLS (Cumulative Layout Shift) mantendo layout estável -->
  <div id="page-skeleton">
    <!-- Header skeleton -->
    <div id="sk-header">
      <div class="sk-logo"></div>
      <div class="sk sk-logo-text"></div>
      <div class="sk-nav">
        <span class="sk"></span>
        <span class="sk"></span>
        <span class="sk"></span>
        <span class="sk"></span>
      </div>
      <div class="sk sk-btn"></div>
    </div>

    <!-- Banner skeleton (escuro, como o banner real) -->
    <div id="sk-banner">
      <div class="sk-content">
        <div class="sk-dark sk-tag"></div>
        <div class="sk-dark sk-h1"></div>
        <div class="sk-dark sk-h1b"></div>
        <div class="sk-dark sk-p"></div>
        <div class="sk-dark sk-p2"></div>
        <div style="background:#f97316;border-radius:12px;" class="sk-cta"></div>
      </div>
      <div class="sk-dark sk-img"></div>
    </div>

    <!-- Sections skeleton -->
    <div id="sk-sections">
      <div id="sk-row">
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
      </div>
    </div>
  </div>

  <!-- App React -->
  <div id="root"></div>

  <!-- Remove skeleton quando React renderizar -->
  <script>
    (function() {
      var root = document.getElementById('root');
      var skeleton = document.getElementById('page-skeleton');
      if (!root || !skeleton) return;
      var observer = new MutationObserver(function(mutations) {
        if (root.childElementCount > 0) {
          skeleton.style.transition = 'opacity 0.2s ease';
          skeleton.style.opacity = '0';
          skeleton.style.pointerEvents = 'none';
          setTimeout(function() {
            if (skeleton.parentNode) skeleton.parentNode.removeChild(skeleton);
          }, 220);
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
    })();
  </script>
</body>

</html>
